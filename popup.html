<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="header-brand">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="url(#grad1)" opacity="0.2"/>
          <path d="M16 8l-4 4-2-2-4 4" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 8h2v2" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="7" cy="7" r="1.5" fill="#00d4ff"/>
          <circle cx="17" cy="17" r="1.5" fill="#7c3aed"/>
          <defs>
            <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="22">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
            <linearGradient id="grad2" x1="6" y1="8" x2="16" y2="14">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <h1 class="header-title">Contact Extractor</h1>
        <p class="header-subtitle" id="currentUrl">Ready to scan</p>
      </div>
    </div>
    <button class="btn-icon" id="settingsToggle" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ===== SETTINGS PANEL ===== -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-item">
        <label class="setting-label" for="scrollSpeed">Scroll Speed</label>
        <div class="setting-control">
          <input type="range" id="scrollSpeed" min="100" max="800" value="300" step="50">
          <span class="setting-value" id="scrollSpeedValue">300px</span>
        </div>
      </div>

      <div class="setting-item">
        <label class="setting-label" for="pauseDuration">Pause Duration</label>
        <div class="setting-control">
          <input type="range" id="pauseDuration" min="500" max="5000" value="2000" step="250">
          <span class="setting-value" id="pauseDurationValue">2.0s</span>
        </div>
      </div>

      <div class="setting-item">
        <label class="setting-label" for="maxScrollAttempts">Max Scroll Attempts</label>
        <div class="setting-control">
          <input type="range" id="maxScrollAttempts" min="1" max="10" value="3" step="1">
          <span class="setting-value" id="maxScrollAttemptsValue">3</span>
        </div>
      </div>

      <div class="setting-item">
        <label class="setting-label" for="ignoreDuplicates">Ignore Duplicate Emails</label>
        <label class="toggle">
          <input type="checkbox" id="ignoreDuplicates" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <label class="setting-label" for="enablePhoneExtraction">Enable Phone Extraction</label>
        <label class="toggle">
          <input type="checkbox" id="enablePhoneExtraction" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- ===== PROGRESS DASHBOARD ===== -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card stat-total">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="totalContacts">0</span>
        <span class="stat-label">Total Contacts</span>
      </div>
    </div>

    <div class="stat-card stat-emails">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="emailCount">0</span>
        <span class="stat-label">Emails</span>
      </div>
    </div>

    <div class="stat-card stat-phones">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="phoneCount">0</span>
        <span class="stat-label">Phones</span>
      </div>
    </div>

    <div class="stat-card stat-progress">
      <div class="stat-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="scrollPercentage">0%</span>
        <span class="stat-label">Scroll Progress</span>
      </div>
    </div>
  </div>

  <!-- ===== PROGRESS BAR ===== -->
  <div class="progress-bar-container" id="progressContainer">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>

  <!-- ===== CONTROL BUTTONS ===== -->
  <div class="controls" id="controls">
    <button class="btn btn-start" id="btnStart" title="Start Scrolling">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Start
    </button>

    <button class="btn btn-pause" id="btnPause" disabled title="Pause">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"/>
        <rect x="14" y="4" width="4" height="16"/>
      </svg>
      Pause
    </button>

    <button class="btn btn-resume" id="btnResume" disabled title="Resume">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Resume
    </button>

    <button class="btn btn-stop" id="btnStop" disabled title="Stop">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      </svg>
      Stop
    </button>
  </div>

  <!-- ===== STATUS MESSAGE ===== -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Ready</span>
  </div>

  <!-- ===== DATA TABLE ===== -->
  <div class="table-container" id="tableContainer">
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>Company</th>
          <th>Person</th>
          <th>Email</th>
          <th>Mobile</th>
          <th>Website</th>
          <th>LinkedIn</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Dynamic rows -->
      </tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="17" y1="11" x2="23" y2="11"/>
      </svg>
      <p>No contacts found yet</p>
      <p class="empty-hint">Click <strong>Start</strong> to begin scanning</p>
    </div>
  </div>

  <!-- ===== EXPORT & ACTIONS BAR ===== -->
  <div class="actions-bar" id="actionsBar">
    <button class="btn btn-export-csv" id="btnExportCSV" title="Export to CSV">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      CSV
    </button>

    <button class="btn btn-export-xlsx" id="btnExportXLSX" title="Export to Excel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Excel
    </button>

    <div class="actions-spacer"></div>

    <button class="btn btn-clear" id="btnClear" title="Clear All Data">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
      Clear
    </button>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div class="toast" id="toast">
    <span class="toast-text" id="toastText"></span>
  </div>

  <!-- Scripts (external only — no inline scripts per MV3 CSP) -->
  <script src="exporter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
